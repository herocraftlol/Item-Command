# ╔══════════════════════════════════════╗
# ║       ItemCommandPlugin Config       ║
# ╚══════════════════════════════════════╝

# Délai anti-spam entre deux utilisations (en millisecondes)
cooldown-ms: 500

# Liste des items déclencheurs
# Chaque entrée peut avoir :
#   name        : nom affiché de l'item (codes couleur &)
#   material    : type d'item Bukkit (ex: BLAZE_ROD, COMPASS, PAPER...)
#   slot        : slot hotbar (0-8), -1 = n'importe quel slot
#   command     : commande exécutée par le joueur (%player% = nom du joueur)
#   permission  : (optionnel) permission requise
#   only-hotbar : true = seulement si tenu en main

items:
  menu_principal:
    name: "&6&lMenu Principal"
    material: COMPASS
    slot: -1
    command: "menu"
    permission: "itemcommand.use"
    only-hotbar: true

messages:
  cooldown: "&cVeuillez patienter avant de réutiliser cet item."
  no-permission: "&cVous n'avez pas la permission d'utiliser cet item."
  reloaded: "&aConfiguration rechargée avec succès."
  item-given: "&aItem donné à &e%player%&a."
